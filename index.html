<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream Pro | Interactive Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar with Progress Tracker -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🎓 EduStream</a>
            <div class="d-flex align-items-center ms-auto">
                <span class="text-light me-2 d-none d-md-inline">Your Progress:</span>
                <div class="progress" style="width: 150px; height: 10px;">
                    <div id="main-progress" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Interactive Hero -->
    <header class="hero-section text-white text-center py-5 mb-4">
        <div class="container">
            <h1 class="display-4 fw-bold">Master New Skills</h1>
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <input type="text" id="courseSearch" class="form-control form-control-lg shadow" placeholder="Search for courses (e.g. 'Python')...">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Filter Tabs -->
        <div class="d-flex flex-wrap justify-content-center gap-2 mb-5" id="filter-group">
            <button class="btn btn-dark rounded-pill px-4 active" data-filter="all">All Courses</button>
            <button class="btn btn-outline-dark rounded-pill px-4" data-filter="development">Development</button>
            <button class="btn btn-outline-dark rounded-pill px-4" data-filter="design">Design</button>
            <button class="btn btn-outline-dark rounded-pill px-4" data-filter="business">Business</button>
        </div>

        <!-- Course Grid -->
        <div class="row g-4" id="course-grid">
            <!-- Courses will be injected by JavaScript -->
        </div>
    </main>

    <!-- Quiz Modal -->
    <div class="modal fade" id="quizModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Course Quiz</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="quiz-container">
                    <!-- Quiz content injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
